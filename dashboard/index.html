<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LX Portal — Dashboard</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- Auth Screen -->
    <div id="authScreen" class="auth-screen">
      <div class="auth-card">
        <div class="auth-logo">LX <span>Portal</span></div>
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login">Sign In</button>
          <button class="auth-tab" data-tab="register">Register</button>
        </div>
        <form id="loginForm" class="auth-form active">
          <input type="email" id="loginEmail" placeholder="Email" required>
          <input type="password" id="loginPassword" placeholder="Password" required>
          <button type="submit" class="btn btn--primary btn--full">Sign In</button>
          <div class="auth-error" id="authError"></div>
        </form>
        <form id="registerForm" class="auth-form">
          <input type="text" id="regName" placeholder="Full Name" required>
          <input type="email" id="regEmail" placeholder="Email" required>
          <input type="password" id="regPassword" placeholder="Password (min 6 chars)" required>
          <input type="text" id="regCompany" placeholder="Company (optional)">
          <button type="submit" class="btn btn--primary btn--full">Create Account</button>
        </form>
      </div>
    </div>

    <!-- Main Layout -->
    <div id="mainLayout" class="main-layout" style="display:none">
      <!-- Sidebar -->
      <nav class="sidebar" id="sidebar">
        <div class="sidebar__header">
          <div class="sidebar__logo">LX</div>
          <div class="sidebar__user" id="sidebarUser">
            <div class="sidebar__user-avatar" id="userAvatar">U</div>
            <div class="sidebar__user-info">
              <div class="sidebar__user-name" id="userName">User</div>
              <div class="sidebar__user-email" id="userEmail">user@email.com</div>
            </div>
          </div>
        </div>
        <div class="sidebar__nav">
          <a class="sidebar__item active" data-page="dashboard"><span class="sidebar__icon">&#9679;</span> Dashboard</a>
          <a class="sidebar__item" data-page="store"><span class="sidebar__icon">&#9733;</span> Marketplace</a>
          <a class="sidebar__item" data-page="ai-hub"><span class="sidebar__icon">&#9881;</span> AI Hub</a>
          <a class="sidebar__item" data-page="projects"><span class="sidebar__icon">&#9776;</span> Projects</a>
          <a class="sidebar__item" data-page="billing"><span class="sidebar__icon">&#36;</span> Billing</a>
          <a class="sidebar__item" data-page="licenses"><span class="sidebar__icon">&#128274;</span> Licenses</a>
          <a class="sidebar__item" data-page="academy"><span class="sidebar__icon">&#127891;</span> Academy</a>
          <a class="sidebar__item" data-page="hosting"><span class="sidebar__icon">&#127760;</span> Hosting</a>
          <a class="sidebar__item" data-page="insights"><span class="sidebar__icon">&#128200;</span> Insights</a>
          <a class="sidebar__item" data-page="teams"><span class="sidebar__icon">&#128101;</span> Team</a>
          <a class="sidebar__item" data-page="support"><span class="sidebar__icon">&#10067;</span> Support</a>
          <a class="sidebar__item" data-page="bookings"><span class="sidebar__icon">&#128197;</span> Bookings</a>
          <a class="sidebar__item" data-page="affiliates"><span class="sidebar__icon">&#128176;</span> Affiliates</a>
          <a class="sidebar__item" data-page="vendors"><span class="sidebar__icon">&#128722;</span> Vendors</a>
          <a class="sidebar__item" data-page="notifications"><span class="sidebar__icon">&#128276;</span> Alerts</a>
        </div>
        <div class="sidebar__footer">
          <a class="sidebar__item" id="logoutBtn"><span class="sidebar__icon">&#10227;</span> Sign Out</a>
        </div>
      </nav>

      <!-- Main Content -->
      <main class="main-content" id="mainContent">
        <header class="topbar">
          <button class="topbar__menu" id="menuToggle">&#9776;</button>
          <h2 class="topbar__title" id="pageTitle">Dashboard</h2>
          <div class="topbar__actions">
            <span class="topbar__credits" id="creditsDisplay">&#9889; 0 credits</span>
            <button class="topbar__notif" id="notifBtn">&#128276;<span class="topbar__badge" id="notifBadge">0</span></button>
          </div>
        </header>
        <div class="content" id="pageContent"></div>
      </main>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
